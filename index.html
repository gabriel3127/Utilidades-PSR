<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA essencial -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PSR" />
    <meta name="theme-color" content="#111827" id="theme-color-meta" />
    <meta id="theme-color-meta" name="theme-color" content="#111827" />

    <!-- Manifesto PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32"  href="/icons/psr-32.png" />
    <link rel="icon" type="image/png" sizes="16x16"  href="/icons/psr-16.png" />
    <link rel="apple-touch-icon"      sizes="180x180" href="/icons/psr-180.png" />

    <!-- Fonte Inter (Tailwind default) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>PSR Embalagens</title>

    <!-- Previne flash de tema errado: aplica dark antes do React montar -->
    <script>
      (function () {
        const saved = localStorage.getItem('psr-theme')
        // Dark é o padrão — só aplica light se explicitamente salvo
        if (saved === 'light') {
          document.documentElement.classList.remove('dark')
        } else {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body class="bg-white dark:bg-gray-950 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
